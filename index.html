<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Algoritma NESAISN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050510;
color:#0ff;
overflow-x:hidden;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
margin-top:20px;
text-shadow:0 0 20px #0ff;
}

h3{
margin-top:5px;
color:#ff00ff;
}

.info{
margin:15px;
font-size:18px;
}

.container{
display:flex;
justify-content:center;
align-items:flex-start;
gap:30px;
padding:20px;
flex-wrap:wrap;
}

.box{
width:400px;
min-height:320px;
max-height:420px;
overflow-y:auto;
border:2px dashed #0ff;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px #0ff inset;
background:rgba(0,0,0,0.4);
transition:0.3s;
}

.item{
background:#111;
margin:10px;
padding:12px;
border-radius:8px;
cursor:grab;
box-shadow:0 0 15px #0ff;
transition:0.3s;
}

.item:hover{
transform:scale(1.05);
}

button{
margin:10px;
padding:12px 25px;
background:#ff00ff;
border:none;
border-radius:25px;
color:white;
cursor:pointer;
font-family:'Orbitron',sans-serif;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff00ff;
}

#result{
font-size:20px;
margin-top:15px;
padding-bottom:40px;
}

.music-btn{
background:#00ffff;
color:black;
}

@media(max-width:768px){
.container{
flex-direction:column;
align-items:center;
}
.box{
width:90%;
}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1 id="mainTitle">Susunlah langkah algoritma</h1>
<h3 id="subTitle">Level 1</h3>

<div class="info">
Level: <span id="level">1</span> |
Skor: <span id="score">0</span>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵 Musik ON</button>

<div class="container">
<div class="box" id="items"></div>
<div class="box" id="dropzone"></div>
</div>

<button onclick="checkAnswer()">Cek Jawaban</button>

<div id="result"></div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="ML.mp3" type="audio/mpeg">
</audio>

<audio id="correctSound">
<source src="ML.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound">
<source src="ML.mp3" type="audio/mpeg">
</audio>

<script>
let level = 1;
let score = 0;
let dragged = null;
let musicPlaying = false;

const levelsData = {
1:[
["Mulai",1],
["Input a,b,c",2],
["Hitung rata",3],
["Tampilkan hasil",4],
["Selesai",5]
],
2:[
["Mulai",1],
["Input data nilai",2],
[" Paquito - 90",3],
[" Sora - 67",4],
["Lapulapu - 50",5],
["Yuzong - 34",6],
["Selesai",7]
],
3:[
["Mulai",1],
["Siapkan mie dan bumbu",2],
["Didihkan air",3],
["Masukkan mie ke dalam air mendidih",4],
["Tunggu hingga mie matang",5],
["Tiriskan mie",6],
["Campurkan mie dengan bumbu",7],
["Aduk hingga merata",8],
["Sajikan mie",9],
["Selesai",10]
]
};

function toggleMusic(){
const music=document.getElementById("bgMusic");
if(!musicPlaying){
music.play();
musicPlaying=true;
event.target.innerText="🔇 Musik OFF";
}else{
music.pause();
musicPlaying=false;
event.target.innerText="🎵 Musik ON";
}
}

function updateTitle(){
const title=document.getElementById("mainTitle");
const sub=document.getElementById("subTitle");

if(level===1){
title.innerText="Susunlah langkah algoritma";
sub.innerText="Level 1";
}
else if(level===2){
title.innerText="Urutkan nilai tertinggi ke terendah";
sub.innerText="Level 2";
}
else if(level===3){
title.innerText="Susun langkah memasak mie";
sub.innerText="Level 3";
}
}

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function loadLevel(){
document.getElementById("items").innerHTML="";
document.getElementById("dropzone").innerHTML="";
document.getElementById("level").innerText=level;
document.getElementById("result").innerText="";

updateTitle();

let data=shuffle([...levelsData[level]]);

data.forEach(d=>{
let div=document.createElement("div");
div.className="item";
div.draggable=true;
div.dataset.order=d[1];
div.innerText=d[0];
div.addEventListener("dragstart",()=>dragged=div);
document.getElementById("items").appendChild(div);
});
}

["items","dropzone"].forEach(id=>{
document.getElementById(id).addEventListener("dragover",e=>e.preventDefault());
document.getElementById(id).addEventListener("drop",function(){
if(dragged){
this.appendChild(dragged);
}
});
});

function checkAnswer(){
let items=document.querySelectorAll("#dropzone .item");
let correct=true;

if(items.length!==levelsData[level].length){
document.getElementById("result").innerText="⚠ Susun semua langkah dulu!";
return;
}

items.forEach((item,index)=>{
if(parseInt(item.dataset.order)!==index+1){
correct=false;
}
});

if(correct){
document.getElementById("correctSound").play();
score+=10;
document.getElementById("score").innerText=score;

if(level<3){
level++;
document.getElementById("result").innerText="🔥 Benar! Naik Level!";
setTimeout(loadLevel,1000);
}else{
document.getElementById("result").innerHTML=
"🏆 GAME SELESAI! Skor Akhir: "+score+
"<br><br><button onclick='restartGame()'>🎮 Main Lagi</button>";
}
}else{
document.getElementById("wrongSound").play();
document.getElementById("result").innerHTML=
"❌ Salah! Susun ulang dan coba lagi!<br><br>" +
"<button onclick='loadLevel()'>🔁 Ulang Level</button>";
}
}

function restartGame(){
level=1;
score=0;
document.getElementById("score").innerText=0;
loadLevel();
}

loadLevel();

/* Background animation */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0ff";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
p.y+=p.speed;
if(p.y>canvas.height)p.y=0;
});
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
